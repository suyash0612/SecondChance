services:
  - type: web
    name: second-opinion-backend
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: "8000"
    healthCheckPath: /health

  - type: static_site
    name: second-opinion-frontend
    buildCommand: npm install && npx expo export --platform web
    staticPublishPath: dist
    envVars:
      - key: EXPO_PUBLIC_BACKEND_URL
        fromService:
          type: web
          name: second-opinion-backend
          property: url
