services:
  - type: web
    name: second-opinion-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: "8000"
    healthCheckPath: /health
    rootDir: backend
